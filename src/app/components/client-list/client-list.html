<div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th
            class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500"
          >
            Cliente
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500"
          >
            Empresa
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500"
          >
            Email
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500"
          >
            Teléfono
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500"
          >
            Tipo
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500"
          >
            Estado
          </th>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-100 bg-white">
        @for (client of clients; track client.id) {
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4">
              <div>
                <p class="font-medium text-gray-900">
                  {{ client.nombre }}
                </p>
                <p class="text-sm text-gray-500">
                  {{ client.dni }}
                </p>
              </div>
            </td>

            <td class="px-6 py-4 text-gray-700">
              {{ client.empresa }}
            </td>

            <td class="px-6 py-4 text-gray-700">
              {{ client.email }}
            </td>

            <td class="px-6 py-4 text-gray-700">
              {{ client.telefono }}
            </td>

            <td class="px-6 py-4">
              <span class="rounded-full bg-blue-100 px-3 py-1 text-xs font-medium text-blue-800">
                {{ client.tipoEmpresa }}
              </span>
            </td>

            <td class="px-6 py-4">
              <span class="rounded-full bg-green-100 px-3 py-1 text-xs font-medium text-green-800">
                {{ client.status }}
              </span>
            </td>
            <td class="px-6 py-4">
              <button  class="rounded-md bg-blue-200 px-3 py-1 text-xs font-medium hover:bg-blue-500 hover:text-white  text-black hover:cursor-pointer">
                <a [routerLink]="['/clients', client.id]" class="flex justify-center items-center gap-3">
                <img class="min-w-6 max-w-8" src="/icons8-ojos-64.png" /> 
                <span class="font-bold">Ver Ficha</span>
              </a>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
