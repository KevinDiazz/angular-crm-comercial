<div class="max-w-4xl mx-auto p-6">
  <div class="bg-white rounded-xl shadow-sm border border-slate-200">
    <!-- Header -->
    <div class="border-b border-slate-200 px-6 py-4">
      <h1 class="text-2xl font-bold text-slate-800">Cliente</h1>
      <p class="text-sm text-slate-500 mt-1">Gestiona la información del cliente.</p>
    </div>

    <!-- Form -->
    <form
      [formGroup]="loginForm"
      (ngSubmit)="update()"
      class="p-6 grid grid-cols-1 md:grid-cols-2 gap-5"
    >
      <!-- ID -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1"> ID </label>
        <input
          formControlName="id"
          readonly
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <!-- Nombre -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1"> Nombre </label>
        <input
          formControlName="nombre"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Email -->
      <div>
        @if (loginForm.get('email')?.invalid) {
          <label class="block text-sm font-medium text-slate-700 mb-1">
            <span class="text-red-600 font-bold">❌ Email no valido</span>
          </label>
        } @else {
          <label class="block text-sm font-medium text-slate-700 mb-1 font-bold"> Email ✅ </label>
        }
        <input
          formControlName="email"
          type="email"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- DNI -->
      <div>
        @if (loginForm.get('dni')?.invalid) {
          <label class="block text-sm font-medium text-slate-700 mb-1">
            <span class="text-red-600 font-bold">❌ DNI no valido</span>
          </label>
        } @else {
          <label class="block text-sm text-slate-700 mb-1 font-bold"> DNI ✅ </label>
        }
        <input
          formControlName="dni"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Empresa -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1"> Empresa </label>
        <input
          formControlName="empresa"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Teléfono -->
      <div>
        @if (loginForm.get('telefono')?.invalid) {
          <label class="block text-sm font-medium text-slate-700 mb-1">
            <span class="text-red-600 font-bold">❌ Telefono no valido</span>
          </label>
        } @else {
          <label class="block text-sm text-slate-700 mb-1 font-bold"> Telefono ✅ </label>
        }
        <input
          formControlName="telefono"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Tipo Empresa -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1"> Tipo Empresa </label>
        <select
          formControlName="tipoEmpresa"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="marketing">marketing</option>
          <option value="construcion">construcion</option>
          <option value="restauracion">restauracion</option>
          <option value="limpieza">limpieza</option>
          <option value="agricultura">agricultura</option>
        </select>
      </div>

      <!-- Estado -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1"> Estado </label>
        <select
          formControlName="status"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="lead">Lead</option>
          <option value="contactado">Contactado</option>
          <option value="propuesta">Propuesta</option>
          <option value="cliente">Cliente</option>
          <option value="perdido">Perdido</option>
        </select>
      </div>

      <!-- Botones -->
      <div class="md:col-span-2 flex justify-end gap-3 pt-4">
        <button
          type="button"
          (click)="showFormEmit()"
          class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100 transition"
        >
          Cancelar
        </button>
@if(loginForm.invalid){
        <button
          type="submit"
           [disabled]="loginForm.invalid"
          class="px-5 py-2 rounded-lg bg-gray-400 text-white"
        >
          Guardar Cliente
        </button>
      }@else{
      <button
          type="submit"
          class="px-5 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition"
        >
          Guardar Cliente
        </button>
      }
      </div>
    </form>
  </div>
</div>
